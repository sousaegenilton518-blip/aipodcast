<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI播客精选</title>
<link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans SC',sans-serif; background:#0F1117; color:#E8EAF0; min-height:100vh; }
.wrap { max-width:480px; margin:0 auto; padding:0 18px 80px; }

.header { padding:48px 0 32px; text-align:center; }
.header-icon { font-size:40px; margin-bottom:14px; }
.header h1 { font-size:26px; font-weight:700; letter-spacing:4px; color:#fff; margin-bottom:8px; }
.header p { font-size:13px; color:#6B7280; letter-spacing:2px; }

.now-playing { background:linear-gradient(135deg,#1E2A4A,#2A1E4A); border-radius:22px; padding:24px; margin-bottom:28px; border:1px solid #2A3050; }
.np-label { font-size:10px; color:#6B7280; letter-spacing:2px; font-weight:600; margin-bottom:12px; }
.np-title { font-size:18px; font-weight:700; color:#fff; line-height:1.5; margin-bottom:4px; }
.np-source { font-size:12px; color:#8B9CC8; margin-bottom:20px; }
.progress-bar { width:100%; height:4px; background:#2A3050; border-radius:4px; appearance:none; cursor:pointer; outline:none; }
.progress-bar::-webkit-slider-thumb { appearance:none; width:14px; height:14px; border-radius:50%; background:#7C8FD4; cursor:pointer; }
.time-row { display:flex; justify-content:space-between; font-size:11px; color:#6B7280; margin-top:8px; margin-bottom:16px; }
.controls { display:flex; align-items:center; justify-content:center; gap:20px; }
.btn-play { width:52px; height:52px; border-radius:50%; background:#7C8FD4; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .2s; }
.btn-play:hover { opacity:.85; }
.btn-play svg { width:22px; height:22px; fill:#fff; }
.btn-skip { background:transparent; border:none; cursor:pointer; color:#6B7280; font-size:13px; font-weight:600; font-family:'Noto Sans SC',sans-serif; padding:8px; transition:color .2s; }
.btn-skip:hover { color:#fff; }

.section-title { font-size:12px; color:#6B7280; letter-spacing:2px; font-weight:700; margin-bottom:14px; }
.ep-list { display:flex; flex-direction:column; gap:10px; }
.ep { background:#161B27; border:1px solid #1E2535; border-radius:16px; padding:16px 18px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:14px; }
.ep:hover { border-color:#3A4570; background:#1A2030; }
.ep.active { border-color:#7C8FD4; background:#1A2040; }
.ep-num { width:36px; height:36px; border-radius:10px; background:#1E2535; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#7C8FD4; flex-shrink:0; }
.ep.active .ep-num { background:#7C8FD4; color:#fff; }
.ep-info { flex:1; min-width:0; }
.ep-title { font-size:14px; font-weight:600; color:#E8EAF0; line-height:1.4; margin-bottom:3px; }
.ep.active .ep-title { color:#fff; }
.ep-meta { font-size:11px; color:#6B7280; }
.ep-play { width:32px; height:32px; border-radius:50%; background:#1E2535; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
.ep.active .ep-play { background:#7C8FD4; }
.ep-play svg { width:12px; height:12px; fill:#7C8FD4; }
.ep.active .ep-play svg { fill:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-icon">🎙️</div>
    <h1>AI 播客精选</h1>
    <p>每期精读 · 中文整理</p>
  </div>

  <div class="now-playing">
    <div class="np-label">NOW PLAYING</div>
    <div class="np-title" id="npTitle">小模型，大智慧：崔叶真的AI民主化之路</div>
    <div class="np-source" id="npSource">TWIML AI Podcast · 2026-01-29</div>
    <audio id="audio" src="audio/ep1.mp3" preload="metadata"></audio>
    <input type="range" class="progress-bar" id="progress" value="0" min="0" max="100" step="0.1">
    <div class="time-row">
      <span id="timeNow">0:00</span>
      <span id="timeTotal">--:--</span>
    </div>
    <div class="controls">
      <button class="btn-skip" onclick="skip(-15)">-15s</button>
      <button class="btn-play" id="btnPlay" onclick="togglePlay()">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="btn-skip" onclick="skip(15)">+15s</button>
    </div>
  </div>

  <div class="section-title">全部节目</div>
  <div class="ep-list" id="epList"></div>
</div>

<script>
const episodes = [
  { title:'小模型，大智慧：崔叶真的AI民主化之路', source:'TWIML AI Podcast', date:'2026-01-29', src:'audio/ep1.mp3' },
  { title:'当一个开发者拒绝了OpenAI的收购：OpenClaw与AI智能体时代的独立宣言', source:'Lex Fridman Podcast', date:'2026-02-12', src:'audio/ep2.mp3' },
  { title:'当AI重塑领导力：脆弱、共情与反脆弱的时代价值', source:'Practical AI', date:'2026-02-18', src:'audio/ep3.mp3' },
  { title:'当SaaS遇上AI：一场正在发生的软件革命', source:'No Priors', date:'2026-02-24', src:'audio/ep4.mp3' },
];

const audio = document.getElementById('audio');
const progress = document.getElementById('progress');
let current = 0;

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

function loadEp(i) {
  current = i;
  const ep = episodes[i];
  audio.src = ep.src;
  document.getElementById('npTitle').textContent = ep.title;
  document.getElementById('npSource').textContent = ep.source + ' · ' + ep.date;
  progress.value = 0;
  document.getElementById('timeNow').textContent = '0:00';
  document.getElementById('timeTotal').textContent = '--:--';
  document.querySelectorAll('.ep').forEach((el,j) => el.classList.toggle('active', j===i));
  audio.play();
  setIcon(true);
}

function togglePlay() {
  if (audio.paused) { audio.play(); setIcon(true); }
  else { audio.pause(); setIcon(false); }
}

function setIcon(playing) {
  document.getElementById('iconPlay').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function skip(s) { audio.currentTime = Math.max(0, audio.currentTime + s); }

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    progress.value = (audio.currentTime / audio.duration) * 100;
    document.getElementById('timeNow').textContent = fmt(audio.currentTime);
  }
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('timeTotal').textContent = fmt(audio.duration);
});
audio.addEventListener('ended', () => {
  if (current < episodes.length - 1) loadEp(current + 1);
  else setIcon(false);
});
progress.addEventListener('input', () => {
  if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
});

function renderList() {
  document.getElementById('epList').innerHTML = episodes.map((ep,i) => `
    <div class="ep${i===0?' active':''}" id="ep${i}" onclick="loadEp(${i})">
      <div class="ep-num">${i+1}</div>
      <div class="ep-info">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-meta">${ep.source} · ${ep.date}</div>
      </div>
      <button class="ep-play" onclick="event.stopPropagation();loadEp(${i})">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  `).join('');
}

document.addEventListener('touchstart', e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
let lt=0; document.addEventListener('touchend', e => { const n=Date.now(); if(n-lt<300) e.preventDefault(); lt=n; }, {passive:false});

renderList();
</script>
</body>
</html>
